---
#V5
- name: Deploy multicast lab
  hosts: cisco
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars:
    ansible_network_os: cisco.ios.ios
    ansible_become: true
    ansible_become_method: enable

  tasks:
    - name: Apply base global config
      cisco.ios.ios_config:
        lines: "{{ base_global_config }}"
      when: base_global_config is defined and base_global_config | length > 0

    - name: Enable multicast globally where required
      cisco.ios.ios_config:
        lines: "{{ multicast_global_config }}"
      when:
        - multicast_enabled | default(false)
        - multicast_global_config is defined
        - multicast_global_config | length > 0

    - name: Configure loopbacks
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines: "{{ loopback_lines }}"
      loop: "{{ loopbacks | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      vars:
        loopback_lines: >-
          {{
            [
              'ip address ' ~ item.ip ~ ' ' ~ item.mask,
              'no shutdown'
            ]
            + (
              ['ip ospf ' ~ (ospf_process | string) ~ ' area ' ~ (ospf_area | string)]
              if item.ospf | default(false) else []
            )
            + (
              ['ip pim sparse-mode']
              if item.pim | default(false) else []
            )
          }}

    - name: Configure data interfaces
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines: "{{ interface_lines }}"
      loop: "{{ interfaces | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      vars:
        interface_lines: >-
          {{
            (
              ['ip address dhcp']
              if item.dhcp | default(false)
              else ['ip address ' ~ item.ip ~ ' ' ~ item.mask]
            )
            + (
              ['description ' ~ item.description]
              if item.description is defined and item.description | length > 0
              else []
            )
            + ['no shutdown']
            + (
              ['ip ospf ' ~ (ospf_process | string) ~ ' area ' ~ (ospf_area | string)]
              if item.ospf | default(false) else []
            )
            + (
              ['ip pim sparse-mode']
              if item.pim | default(false) else []
            )
            + (
              ['ip igmp join-group ' ~ item.igmp_join_group]
              if item.igmp_join_group is defined and item.igmp_join_group | length > 0
              else []
            )
          }}

    - name: Shutdown unused interfaces
      cisco.ios.ios_config:
        parents: "interface {{ item }}"
        lines:
          - shutdown
      loop: "{{ shutdown_interfaces | default([]) }}"
      loop_control:
        label: "{{ item }}"

    - name: Configure OSPF router-id
      cisco.ios.ios_config:
        parents: "router ospf {{ ospf_process }}"
        lines:
          - "router-id {{ router_id }}"
      when:
        - ospf_process is defined
        - router_id is defined
        - router_id | length > 0

    - name: Configure RP where multicast is enabled
      cisco.ios.ios_config:
        lines:
          - "ip pim rp-address {{ rp_address }}"
      when:
        - multicast_enabled | default(false)
        - rp_enabled | default(false)
        - rp_address is defined
        - rp_address | length > 0

    - name: Save config if modified
      cisco.ios.ios_config:
        save_when: modified