---
- name: Deploy multicast lab
  hosts: cisco
  gather_facts: false
  connection: ansible.netcommon.network_cli

  vars:
    ansible_network_os: cisco.ios.ios
    ansible_become: true
    ansible_become_method: enable
    ansible_command_timeout: 120

  tasks:
    - name: Set hostname
      cisco.ios.ios_config:
        lines:
          - "hostname {{ hostname }}"
      when: hostname is defined

    - name: Configure loopback addresses
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines:
          - "ip address {{ item.ip }} {{ item.mask }}"
          - "no shutdown"
      loop: "{{ loopbacks | default([]) }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Configure loopback OSPF
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines:
          - "ip ospf {{ ospf_process }} area {{ ospf_area }}"
      loop: "{{ loopbacks | default([]) }}"
      when:
        - item.ospf | default(false)
        - ospf_process is defined
        - ospf_area is defined
      loop_control:
        label: "{{ item.name }}"

    - name: Configure loopback PIM
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines:
          - "ip pim sparse-mode"
      loop: "{{ loopbacks | default([]) }}"
      when: item.pim | default(false)
      loop_control:
        label: "{{ item.name }}"

    - name: Configure interface descriptions
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines:
          - "description {{ item.description }}"
      loop: "{{ interfaces | default([]) }}"
      when: item.description is defined
      loop_control:
        label: "{{ item.name }}"

    - name: Configure interface IP addresses
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines:
          - "ip address {{ item.ip }} {{ item.mask }}"
      loop: "{{ interfaces | default([]) }}"
      when:
        - not (item.dhcp | default(false))
        - item.ip is defined
        - item.mask is defined
      loop_control:
        label: "{{ item.name }}"

    - name: Configure DHCP interfaces
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines:
          - "ip address dhcp"
      loop: "{{ interfaces | default([]) }}"
      when: item.dhcp | default(false)
      loop_control:
        label: "{{ item.name }}"

    - name: Ensure interfaces are up
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines:
          - "no shutdown"
      loop: "{{ interfaces | default([]) }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Configure interface OSPF
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines:
          - "ip ospf {{ ospf_process }} area {{ ospf_area }}"
      loop: "{{ interfaces | default([]) }}"
      when:
        - item.ospf | default(false)
        - ospf_process is defined
        - ospf_area is defined
      loop_control:
        label: "{{ item.name }}"

    - name: Configure interface PIM
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines:
          - "ip pim sparse-mode"
      loop: "{{ interfaces | default([]) }}"
      when: item.pim | default(false)
      loop_control:
        label: "{{ item.name }}"

    - name: Configure interface IGMP join-group
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines:
          - "ip igmp join-group {{ item.igmp_join_group }}"
      loop: "{{ interfaces | default([]) }}"
      when: item.igmp_join_group is defined
      loop_control:
        label: "{{ item.name }}"

    - name: Shutdown unused interfaces
      cisco.ios.ios_config:
        parents: "interface {{ item }}"
        lines:
          - "shutdown"
      loop: "{{ shutdown_interfaces | default([]) }}"
      loop_control:
        label: "{{ item }}"

    - name: Configure OSPF router-id
      cisco.ios.ios_config:
        parents: "router ospf {{ ospf_process }}"
        lines:
          - "router-id {{ router_id }}"
      when:
        - ospf_process is defined
        - router_id is defined

    - name: Configure RP where multicast is enabled
      cisco.ios.ios_config:
        lines:
          - "ip pim rp-address {{ rp_address }}"
      when:
        - multicast_enabled | default(false)
        - rp_enabled | default(false)
        - rp_address is defined

    - name: Save config if modified
      cisco.ios.ios_config:
        save_when: modified
      vars:
        ansible_command_timeout: 120
