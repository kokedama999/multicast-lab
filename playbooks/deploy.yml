---
- name: Deploy base, OSPF and multicast config to Cisco routers
  hosts: cisco
  connection: ansible.netcommon.network_cli
  gather_facts: no

  collections:
    - cisco.ios

  pre_tasks:
    - name: Load global vars explicitly
      ansible.builtin.include_vars:
        file: "{{ inventory_dir }}/group_vars/all.yml"

    - name: Debug global vars (sanity check)
      ansible.builtin.debug:
        msg:
          host: "{{ inventory_hostname }}"
          ospf_process: "{{ ospf_process | default('MISSING') }}"
          ospf_area: "{{ ospf_area | default('MISSING') }}"
          rp_address: "{{ rp_address | default('MISSING') }}"

    - name: Fail if globals missing
      ansible.builtin.assert:
        that:
          - ospf_process is defined
          - ospf_area is defined
          - rp_address is defined
        fail_msg: "Global vars not loaded properly"

  vars:
    ansible_network_os: cisco.ios.ios
    ansible_command_timeout: 300

  tasks:

    - name: Push base global config
      cisco.ios.ios_config:
        lines: "{{ base_global_config | default([]) }}"
      when: base_global_config | default([]) | length > 0

    - name: Set hostname
      cisco.ios.ios_config:
        lines:
          - "hostname {{ hostname }}"
      when: hostname is defined

    - name: Enable multicast globally
      cisco.ios.ios_config:
        lines: "{{ multicast_global_config | default([]) }}"
      when:
        - multicast_enabled | default(false)
        - multicast_global_config | default([]) | length > 0

    - name: Configure RP address globally
      cisco.ios.ios_config:
        lines:
          - "ip pim rp-address {{ rp_address }}"
      when:
        - multicast_enabled | default(false)
        - rp_address is defined

    - name: Configure loopback interfaces
      cisco.ios.ios_config:
        parents:
          - "interface {{ item.name }}"
        lines:
          - "ip address {{ item.ip }} {{ item.mask }}"
          - "no shutdown"
      loop: "{{ loopbacks | default([]) }}"

    - name: Configure routed interfaces
      cisco.ios.ios_config:
        parents:
          - "interface {{ item.name }}"
        lines: >-
          {{
            (['description ' ~ item.description] if item.description is defined else [])
            + ['ip address ' ~ item.ip ~ ' ' ~ item.mask]
            + ['no shutdown']
          }}
      loop: "{{ interfaces | default([]) }}"

    - name: Configure OSPF router process
      cisco.ios.ios_config:
        parents:
          - "router ospf {{ ospf_process }}"
        lines:
          - "router-id {{ router_id }}"
      when: router_id is defined

    - name: Configure OSPF on loopbacks
      cisco.ios.ios_config:
        parents:
          - "interface {{ item.name }}"
        lines:
          - "ip ospf {{ ospf_process }} area {{ ospf_area }}"
      loop: "{{ loopbacks | default([]) }}"
      when: item.ospf | default(false)

    - name: Configure OSPF on physical interfaces
      cisco.ios.ios_config:
        parents:
          - "interface {{ item.name }}"
        lines:
          - "ip ospf {{ ospf_process }} area {{ ospf_area }}"
      loop: "{{ interfaces | default([]) }}"
      when: item.ospf | default(false)

    - name: Configure PIM on loopbacks
      cisco.ios.ios_config:
        parents:
          - "interface {{ item.name }}"
        lines:
          - "ip pim sparse-mode"
      loop: "{{ loopbacks | default([]) }}"
      when:
        - multicast_enabled | default(false)
        - item.pim | default(false)

    - name: Configure PIM on physical interfaces
      cisco.ios.ios_config:
        parents:
          - "interface {{ item.name }}"
        lines:
          - "ip pim sparse-mode"
      loop: "{{ interfaces | default([]) }}"
      when:
        - multicast_enabled | default(false)
        - item.pim | default(false)

    - name: Configure IGMP join groups
      cisco.ios.ios_config:
        parents:
          - "interface {{ item.name }}"
        lines:
          - "ip igmp join-group {{ item.igmp_join_group }}"
      loop: "{{ interfaces | default([]) }}"
      when:
        - multicast_enabled | default(false)
        - item.igmp_join_group is defined

    - name: Shutdown unused interfaces
      cisco.ios.ios_config:
        parents:
          - "interface {{ item }}"
        lines:
          - "shutdown"
      loop: "{{ shutdown_interfaces | default([]) }}"

    - name: Save config if modified
      cisco.ios.ios_config:
        save_when: modified
      vars:
        ansible_command_timeout: 300
