- name: Deploy multicast lab
  hosts: cisco
  gather_facts: false

  vars:
    ospf_process: 1
    ospf_area: 0
    rp_address: 3.3.3.3

    base_global_config:
      - no ip domain lookup
      - ip cef
      - login on-success log
      - no ipv6 cef
      - spanning-tree mode rapid-pvst
      - ip http server
      - ip http secure-server
      - ip ssh bulk-mode 131072
      - no logging btrace

    multicast_global_config:
      - ip multicast-routing

  tasks:
    - name: Apply base global config
      cisco.ios.ios_config:
        lines: "{{ base_global_config }}"

    - name: Enable multicast globally where required
      cisco.ios.ios_config:
        lines: "{{ multicast_global_config }}"
      when: multicast_enabled | default(false)

    - name: Configure loopbacks
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines: >-
          {{
            ['ip address ' ~ item.ip ~ ' ' ~ item.mask, 'no shutdown']
            + (['ip ospf ' ~ ospf_process|string ~ ' area ' ~ ospf_area|string] if item.ospf | default(false) else [])
            + (['ip pim sparse-mode'] if item.pim | default(false) else [])
          }}
      loop: "{{ loopbacks | default([]) }}"

    - name: Configure data interfaces
      cisco.ios.ios_config:
        parents: "interface {{ item.name }}"
        lines: >-
          {{
            (['ip address dhcp'] if item.dhcp | default(false) else ['ip address ' ~ item.ip ~ ' ' ~ item.mask])
            + ['no shutdown']
            + (['ip ospf ' ~ ospf_process|string ~ ' area ' ~ ospf_area|string] if item.ospf | default(false) else [])
            + (['ip pim sparse-mode'] if item.pim | default(false) else [])
            + (['ip igmp join-group ' ~ item.igmp_join_group] if item.igmp_join_group is defined else [])
          }}
      loop: "{{ interfaces | default([]) }}"

    - name: Configure OSPF router-id
      cisco.ios.ios_config:
        parents: "router ospf {{ ospf_process }}"
        lines:
          - "router-id {{ router_id }}"
      when: router_id is defined

    - name: Configure RP where multicast is enabled
      cisco.ios.ios_config:
        lines:
          - "ip pim rp-address {{ rp_address }}"
      when:
        - multicast_enabled | default(false)
        - rp_enabled | default(false)

    - name: Save config
      cisco.ios.ios_config:
        save_when: changed
